name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
          # The home-assistant/brands repo no longer accepts custom
          # integrations (HA 2026.3+). Brand images now ship locally in
          # custom_components/aromadd/brand/, so there is nothing for the
          # 'brands' check to validate against -- it is ignored intentionally.
          # See https://developers.home-assistant.io/blog/2026/02/24/brands-proxy-api
          ignore: brands

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hassfest Action
        uses: home-assistant/actions/hassfest@master
